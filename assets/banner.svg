<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="250">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#111219" />
    </linearGradient>

    <!-- Theme Gradients -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <linearGradient id="glow-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </linearGradient>

    <!-- Dot Grid Pattern -->
    <pattern id="dot-grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity="0.05" />
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow1">
        <feFuncA type="linear" slope="0.6"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="12" />
  
  <!-- Dot Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#dot-grid)" rx="12" />

  <!-- Ambient Glow Orbs -->
  <circle cx="100" cy="80" r="120" fill="#6366f1" opacity="0.15" filter="url(#glow)" />
  <circle cx="700" cy="170" r="100" fill="#a855f7" opacity="0.15" filter="url(#glow)" />

  <!-- Abstract Tech Lines / Wave -->
  <path d="M-50,200 Q200,100 400,180 T850,90" fill="none" stroke="url(#brand-grad)" stroke-width="2" opacity="0.2" />
  <path d="M-50,220 Q220,120 420,200 T850,110" fill="none" stroke="url(#brand-grad)" stroke-width="1" opacity="0.1" />

  <!-- Sparkles / Tech Accents -->
  <!-- Top Right Sparkle -->
  <path d="M720,40 L723,47 L730,50 L723,53 L720,60 L717,53 L710,50 L717,47 Z" fill="#a855f7" opacity="0.6" />
  <!-- Bottom Left Sparkle -->
  <path d="M80,180 L82,185 L87,187 L82,189 L80,194 L78,189 L73,187 L78,185 Z" fill="#6366f1" opacity="0.5" transform="translate(-10,0) scale(1.2)" />

  <!-- Content Group -->
  <g transform="translate(50, 0)">
    <!-- Simulated Code Bracket Background Accent -->
    <text x="-15" y="145" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="140" fill="#ffffff" fill-opacity="0.02" pointer-events="none">&lt;</text>
    <text x="640" y="145" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="140" fill="#ffffff" fill-opacity="0.02" pointer-events="none">&gt;</text>

    <!-- Welcome Text -->
    <text x="0" y="80" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="16" fill="#6366f1" letter-spacing="3">HELLO WORLD, I'M</text>

    <!-- Main Title (Name) -->
    <text x="0" y="135" font-family="'Consolas', 'Monaco', 'Courier New', Courier, monospace" font-weight="700" font-size="52" fill="#ffffff" filter="url(#text-glow)" letter-spacing="1">Roel</text>

    <!-- Subtitle (Role) -->
    <text x="0" y="175" font-family="'Inconsolata', 'Consolas', monospace" font-weight="400" font-size="18" fill="#f3f4f6" letter-spacing="1">
      <tspan fill="#a855f7">~/</tspan>Full-Stack Developer <tspan fill="#6366f1">&amp;</tspan> Tooling Enthusiast
    </text>

    <!-- Mini status / pulse -->
    <circle cx="6" cy="204" r="4" fill="#00ff88" />
    <circle cx="6" cy="204" r="8" fill="#00ff88" fill-opacity="0.4" stroke="#00ff88" stroke-width="1" opacity="0.7">
      <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite" />
    </circle>
    <text x="22" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#ffffff" fill-opacity="0.6" letter-spacing="0.5">Currently designing cool things</text>
  </g>

  <!-- Border -->
  <rect x="0.5" y="0.5" width="799" height="249" fill="none" stroke="#ffffff" stroke-opacity="0.08" rx="12" />
</svg>
